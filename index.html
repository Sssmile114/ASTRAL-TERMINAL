<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>深空数据观测站 · Deep Space Observation Station</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }
    #start-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
    }
    .start-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .start-video-2 {
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .start-video-2.visible {
      opacity: 1;
    }
    .start-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1;
    }
    .start-content {
      position: relative;
      z-index: 2;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 40px;
      user-select: none;
      -webkit-user-select: none;
    }
    .start-title {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: startFadeIn 1.5s ease-out forwards;
    }
    .start-title-main {
      font-family: "JetBrains Mono", "Consolas", monospace;
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 30px rgba(0, 255, 136, 0.4), 0 0 60px rgba(0, 255, 136, 0.15);
      letter-spacing: 6px;
    }
    .start-title-sub {
      font-family: "JetBrains Mono", "Consolas", monospace;
      font-size: clamp(0.6rem, 1.5vw, 1rem);
      font-weight: 300;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 4px;
    }
    .start-prompt {
      display: flex;
      align-items: center;
      gap: 4px;
      animation: startFadeIn 1.5s ease-out 1.5s both, startPulse 2s ease-in-out 3s infinite;
    }
    .start-prompt-text {
      font-family: "JetBrains Mono", "Consolas", monospace;
      font-size: clamp(0.75rem, 1.2vw, 1rem);
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 3px;
    }
    .start-cursor {
      font-family: "JetBrains Mono", "Consolas", monospace;
      font-size: clamp(0.75rem, 1.2vw, 1rem);
      color: #00ff88;
      animation: blink 1s step-end infinite;
    }
    @keyframes startFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes startPulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="start-screen">
    <video id="start-video-1" class="start-video" playsinline muted></video>
    <video id="start-video-2" class="start-video start-video-2" playsinline muted></video>
    <div class="start-overlay"></div>
    <audio id="start-bgm" src="src/music/▶_Ad_astra.m4a" loop preload="auto"></audio>
    <div class="start-content">
      <div class="start-title">
        <span class="start-title-main">深空数据观测站</span>
        <span class="start-title-sub">DEEP SPACE OBSERVATION STATION</span>
      </div>
      <div class="start-prompt">
        <span class="start-prompt-text">[ 点击任意位置启动 ]</span>
        <span class="start-cursor">_</span>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var screen = document.getElementById('start-screen');
      var video1 = document.getElementById('start-video-1');
      var video2 = document.getElementById('start-video-2');
      var bgm = document.getElementById('start-bgm');

      // Play start1
      video1.src = 'src/start/start1.mp4';
      video1.load();
      video1.play().catch(function() {});

      // Auto-play background music
      bgm.volume = 0.4;
      bgm.play().catch(function() {});

      // start1 ends → crossfade to start2 loop
      video1.addEventListener('ended', function onEnded() {
        video1.removeEventListener('ended', onEnded);
        video2.src = 'src/start/start2.mp4';
        video2.loop = true;
        video2.load();
        video2.play().catch(function() {});
        video2.classList.add('visible');
      });

      // Click → navigate to terminal.html
      screen.addEventListener('click', function() {
        screen.style.cursor = 'default';
        bgm.pause(); bgm.src = '';
        // Fade out effect
        screen.style.transition = 'opacity 0.6s ease';
        screen.style.opacity = '0';
        setTimeout(function() {
          window.location.href = 'terminal.html';
        }, 600);
      });
    })();
  </script>
</body>
</html>
